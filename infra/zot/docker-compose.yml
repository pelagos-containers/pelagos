name: zot-registry
services:
  zot:
    image: ghcr.io/project-zot/zot-linux-amd64:latest
    ports:
      - "5000:5000"
    volumes:
      - /mnt/primary_storage/zot/data:/var/lib/registry
      - /mnt/primary_storage/zot/config:/etc/zot
    restart: unless-stopped
    healthcheck:
      test: ["NONE"]
