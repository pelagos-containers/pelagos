# Manually-triggered admin tool for the Buildkite package registry.
#
# Background: the registry hit its plan resource limit ("Resource limit reached")
# around v0.65.36 — uploads 403'd because it was FULL, not because of a bad token.
# This workflow can prune old versions to free space and (re)upload a release's
# .debs. All ops use PACKAGECLOUD_CLEANUP_TOKEN (read + write + delete_packages).
#
# Modes:
#   dry-run  list which versions WOULD be pruned (default; deletes nothing)
#   delete   prune all but the newest `keep_versions` versions
#   upload   download a release's .debs from GitHub and push them to the registry
name: Buildkite Registry Admin

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run = list prune plan; delete = prune old versions; upload = push a release's .debs"
        type: choice
        options: [dry-run, delete, upload]
        default: dry-run
      keep_versions:
        description: "[prune] number of most-recent versions to keep (each ≈ 2 .debs)"
        default: "10"
        required: true
      release_tag:
        description: "[upload] release tag to push (e.g. v0.65.39); blank = latest release"
        default: ""

jobs:
  registry:
    runs-on: ubuntu-latest
    steps:
      - name: Manage Buildkite registry
        env:
          # Single token for every Buildkite registry op (read + write + delete).
          PACKAGECLOUD_TOKEN: ${{ secrets.PACKAGECLOUD_CLEANUP_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODE: ${{ inputs.mode }}
          KEEP: ${{ inputs.keep_versions }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          ORG=christopher-brown
          REG=pelagos
          BASE="https://api.buildkite.com/v2/packages/organizations/${ORG}/registries/${REG}/packages"

          # ── upload mode ────────────────────────────────────────────────────────
          if [ "${MODE}" = "upload" ]; then
            TAG="${RELEASE_TAG}"
            [ -z "${TAG}" ] && TAG=$(gh release list --repo "${GITHUB_REPOSITORY}" -L 1 --json tagName -q '.[0].tagName')
            VERSION="${TAG#v}"
            echo "Uploading .debs for ${TAG} (version ${VERSION})"
            mkdir -p dist
            gh release download "${TAG}" --repo "${GITHUB_REPOSITORY}" --pattern 'pelagos_*.deb' --dir dist --clobber
            ls -1 dist/*.deb
            fail=0
            for f in dist/pelagos_*.deb; do
              code=$(curl -sS -o /tmp/up_resp -w '%{http_code}' -X POST "${BASE}" \
                -H "Authorization: Bearer ${PACKAGECLOUD_TOKEN}" -F "file=@${f}")
              if [ "$code" = "201" ] || [ "$code" = "409" ]; then
                echo "uploaded ${f}: HTTP ${code} ($([ "$code" = "409" ] && echo "already present" || echo "ok"))"
              else
                echo "FAILED ${f}: HTTP ${code} -- $(cat /tmp/up_resp)"
                fail=1
              fi
            done
            [ "$fail" -ne 0 ] && { echo "::error::Upload failed (token write scope, or registry still over quota)."; exit 1; }
            echo "Upload complete."
            exit 0
          fi

          # ── list (shared by dry-run / delete) ──────────────────────────────────
          # The list endpoint wraps results in {"items":[...]} and returns them
          # OLDEST-first, so we sort by version ourselves below.
          : > all.ndjson
          page=1
          while :; do
            resp=$(curl -sS -H "Authorization: Bearer ${PACKAGECLOUD_TOKEN}" "${BASE}?per_page=100&page=${page}")
            if ! echo "$resp" | jq -e '.items | type=="array"' >/dev/null 2>&1; then
              echo "::error::List API response had no .items array (page ${page}). Response:"
              echo "$resp"
              exit 1
            fi
            n=$(echo "$resp" | jq '.items | length')
            echo "$resp" | jq -c '.items[] | {id, name, version, created_at}' >> all.ndjson
            [ "$n" -lt 100 ] && break
            page=$((page + 1))
          done

          total=$(wc -l < all.ndjson | tr -d ' ')
          echo "Total package entries in registry: ${total}"
          if [ "${total}" -eq 0 ]; then echo "Nothing to prune."; exit 0; fi

          # Keep the newest $KEEP versions by SEMVER (sort -V), regardless of API
          # order, so we never accidentally prune recent releases.
          mapfile -t KEEPV < <(jq -r '.version' all.ndjson | sort -uV -r | head -n "${KEEP}")
          printf 'Keeping newest %s version(s): %s\n' "${KEEP}" "${KEEPV[*]}"
          KEEPSET=$(printf '%s\n' "${KEEPV[@]}" | jq -R . | jq -s .)

          # Package entries whose version is NOT in the keep set.
          jq -c --argjson keep "${KEEPSET}" 'select(.version as $v | ($keep | index($v)) | not)' all.ndjson > prune.ndjson || true
          to_prune=$(wc -l < prune.ndjson | tr -d ' ')
          echo "Package entries to prune: ${to_prune}"
          if [ "${to_prune}" -eq 0 ]; then echo "Already within the keep window. Done."; exit 0; fi

          echo "----- versions slated for pruning -----"
          jq -r '"\(.version)\t\(.name)\t\(.created_at)\t\(.id)"' prune.ndjson | sort -u
          echo "---------------------------------------"

          if [ "${MODE}" != "delete" ]; then
            echo "DRY-RUN: nothing deleted. Re-run with mode=delete to prune the ${to_prune} entries above."
            exit 0
          fi

          # delete (best-effort per item; report each)
          fail=0
          while read -r row; do
            id=$(echo "$row" | jq -r '.id')
            ver=$(echo "$row" | jq -r '.version')
            code=$(curl -sS -o /tmp/del_resp -w '%{http_code}' -X DELETE \
              -H "Authorization: Bearer ${PACKAGECLOUD_TOKEN}" "${BASE}/${id}")
            if [ "$code" = "200" ] || [ "$code" = "204" ]; then
              echo "deleted ${ver} (${id}): HTTP ${code}"
            else
              echo "FAILED ${ver} (${id}): HTTP ${code} -- $(cat /tmp/del_resp)"
              fail=1
            fi
          done < prune.ndjson
          if [ "$fail" -ne 0 ]; then
            echo "::error::Some deletions failed (token likely lacks delete_packages scope)."
            exit 1
          fi
          echo "Prune complete."
